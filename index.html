<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Panorama — Les formes de communication numérique</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0D1B2A;--s1:#162333;--s2:#1D2F42;--s3:#243548;
  --border:rgba(255,255,255,.07);--text:#EDF2F7;--muted:rgba(237,242,247,.5);
  --green:#2ECC71;--red:#E74C3C;--orange:#F5A623;--blue:#4A9EE0;
  --font-h:'Sora',sans-serif;--font-b:'DM Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 15% 50%,rgba(46,204,113,.04),transparent 50%),
             radial-gradient(ellipse at 85% 50%,rgba(24,119,242,.04),transparent 50%)}
#app{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;max-width:920px;margin:0 auto;width:100%}
.screen{display:none;flex:1;flex-direction:column;overflow:hidden}
.screen.active{display:flex}

/* ── MENU ── */
#s-menu{align-items:center;justify-content:center;padding:20px;gap:0;text-align:center}
.menu-chip{font-family:var(--font-h);font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.menu-title{font-family:var(--font-h);font-size:clamp(22px,4.5vw,38px);font-weight:900;line-height:1.1;margin-bottom:6px;background:linear-gradient(135deg,#fff 20%,rgba(255,255,255,.5));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.menu-sub{font-size:13px;color:var(--muted);margin-bottom:22px;line-height:1.7;max-width:420px}
.tool-nav{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:520px;margin-bottom:20px}
.tool-btn{display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:12px;border:none;background:var(--s1);border:1px solid var(--border);color:var(--text);font-family:var(--font-h);font-size:13px;font-weight:700;cursor:pointer;transition:all .18s}
.tool-btn:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.2)}
.tool-btn .tb-ico{font-size:20px}
.compare-btn{padding:14px 36px;background:linear-gradient(135deg,var(--orange),#E08010);border:none;border-radius:50px;color:white;font-family:var(--font-h);font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 4px 20px rgba(245,166,35,.3);transition:all .15s}
.compare-btn:hover{transform:translateY(-2px)}

/* ── TOOL SCREEN ── */
#s-tool{flex-direction:column;overflow:hidden}
.tool-header{display:flex;align-items:center;gap:12px;padding:10px 16px;flex-shrink:0}
.back-btn{background:transparent;border:1px solid var(--border);border-radius:20px;padding:5px 12px;color:var(--muted);font-size:12px;cursor:pointer;font-family:var(--font-b);transition:all .15s}
.back-btn:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
.tool-header-title{font-family:var(--font-h);font-size:15px;font-weight:800;flex:1}
.tool-nav-btns{display:flex;gap:4px}
.tnb{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:var(--font-b);color:var(--muted);transition:all .15s}
.tnb:hover{color:var(--text)}
.tnb.active{color:white;border-color:transparent}
.tool-body{flex:1;overflow-y:auto;padding:12px 16px 24px}
.hero-card{border-radius:20px;padding:22px 20px 18px;margin-bottom:14px;display:flex;align-items:flex-start;gap:16px}
.hero-ico{font-size:52px;flex-shrink:0;line-height:1}
.hero-name{font-family:var(--font-h);font-size:22px;font-weight:900;margin-bottom:4px}
.hero-tagline{font-size:13px;opacity:.85;line-height:1.5;margin-bottom:10px}
.hero-devices{display:flex;gap:6px;flex-wrap:wrap}
.device-tag{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.15);color:white}
.section-title{font-family:var(--font-h);font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.pro-con-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.pro-col,.con-col{border-radius:12px;padding:12px 14px}
.pro-col{background:rgba(46,204,113,.08);border:1px solid rgba(46,204,113,.18)}
.con-col{background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.18)}
.pc-title{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.pro-col .pc-title{color:var(--green)}
.con-col .pc-title{color:var(--red)}
.pc-item{font-size:12px;line-height:1.5;padding:4px 0;display:flex;gap:6px;align-items:flex-start;color:rgba(237,242,247,.85);border-top:1px solid rgba(255,255,255,.05)}
.pc-item:first-of-type{border-top:none}
.pci-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:5px}
.pro-col .pci-dot{background:var(--green)}
.con-col .pci-dot{background:var(--red)}
.use-cases{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.use-case{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;gap:10px;align-items:flex-start;font-size:13px;line-height:1.5}
.uc-ico{font-size:18px;flex-shrink:0;margin-top:1px}
.uc-title{font-weight:700;margin-bottom:2px}
.uc-desc{font-size:12px;color:var(--muted)}
.tip-box{background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.2);border-radius:10px;padding:12px 14px;font-size:12px;line-height:1.6;color:rgba(237,242,247,.85);margin-bottom:14px}
.tip-box::before{content:'💡  ';font-size:14px}
.tip-box strong{color:white}

/* ── SIMULATION WRAPPER ── */
.sim-section{margin-top:4px;margin-bottom:8px}
.sim-section-title{font-family:var(--font-h);font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:6px}
.sim-outer{display:flex;align-items:flex-start;justify-content:center;gap:24px;flex-wrap:wrap;width:100%}
.sim-outer.single{justify-content:center}
.sim-label{font-size:12px;font-weight:700;text-align:center;margin-top:10px;letter-spacing:.08em;text-transform:uppercase}

/* ── PHONE SHELL ── */
.phone-shell{
  position:relative;background:#111;
  border-radius:36px;
  box-shadow:0 0 0 1.5px #333,0 12px 40px rgba(0,0,0,.6);
  flex-shrink:0;overflow:visible;
}
.phone-screen{
  position:absolute;overflow:hidden;
  background:white;border-radius:inherit;
}
.dyn-island{
  position:absolute;top:8px;left:50%;transform:translateX(-50%);
  background:#111;border-radius:12px;z-index:10;pointer-events:none;
}
.punch{
  position:absolute;top:11px;left:50%;transform:translateX(-50%);
  background:#111;border-radius:50%;z-index:10;pointer-events:none;
}
.home-bar-s{
  position:absolute;bottom:5px;left:50%;transform:translateX(-50%);
  background:#444;border-radius:2px;z-index:10;pointer-events:none;
}

/* ── PC SHELL ── */
.pc-shell{flex-shrink:0;display:flex;flex-direction:column;align-items:center}
.pc-lid{border-radius:10px 10px 0 0;overflow:hidden;border:2px solid #555}
.pc-screen-inner{background:white;overflow:hidden}
.pc-base{background:#3a3a3a;border-radius:0 0 6px 6px;border:2px solid #555;border-top:none;display:flex;align-items:center;justify-content:center}

/* ── SMS SIMULATION ── */
.sms-ui{display:flex;flex-direction:column;height:100%;background:#f2f2f7;font-family:var(--font-b)}
.sms-navbar{
  background:white;padding:14px 16px 10px;border-bottom:1px solid #e8e8e8;flex-shrink:0;
  display:flex;align-items:center;gap:8px;
}
.sms-back{color:#007AFF;font-size:16px;font-weight:600}
.sms-contact{text-align:center;flex:1}
.sms-contact-name{font-size:18px;font-weight:700;color:#111}
.sms-contact-sub{font-size:13px;color:#888}
.sms-thread{flex:1;overflow-y:auto;padding:12px 12px 6px;display:flex;flex-direction:column;gap:8px}
.sms-bubble-wrap{display:flex;flex-direction:column}
.sms-bubble-wrap.out{align-items:flex-end}
.sms-bubble-wrap.in{align-items:flex-start}
.sms-bubble{
  max-width:78%;padding:11px 16px;font-size:16px;line-height:1.4;word-break:break-word;
  border-radius:20px;
}
.sms-bubble.out{background:#007AFF;color:white;border-radius:20px 20px 4px 20px}
.sms-bubble.in{background:white;color:#111;border-radius:20px 20px 20px 4px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.sms-time{font-size:12px;color:#999;margin-top:3px;padding:0 6px}
.sms-input-row{
  background:white;border-top:1px solid #e8e8e8;padding:10px 12px;
  display:flex;align-items:center;gap:8px;flex-shrink:0;
}
.sms-input-field{
  flex:1;background:#f2f2f7;border-radius:20px;padding:10px 14px;
  font-size:15px;color:#333;font-family:var(--font-b);border:none;outline:none;
}
.sms-send-btn{
  width:38px;height:38px;background:#007AFF;border-radius:50%;border:none;
  color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.sms-annot{
  background:rgba(0,122,255,.08);border:1px solid rgba(0,122,255,.2);
  border-radius:10px;padding:8px 12px;margin:4px 0;
  font-size:13px;color:#005ec4;display:flex;align-items:center;gap:6px;
}

/* ── WHATSAPP SIMULATION ── */
.wa-ui{display:flex;flex-direction:column;height:100%;background:#ECE5DD;font-family:var(--font-b)}
.wa-navbar{
  background:#128C7E;padding:12px 14px;flex-shrink:0;
  display:flex;align-items:center;gap:10px;
}
.wa-back{color:white;font-size:16px;opacity:.9}
.wa-avatar{width:38px;height:38px;border-radius:50%;background:#25D366;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:white;flex-shrink:0}
.wa-contact-info{flex:1}
.wa-contact-name{font-size:17px;font-weight:700;color:white}
.wa-contact-status{font-size:12px;color:rgba(255,255,255,.75)}
.wa-icons{display:flex;gap:16px;color:white;font-size:20px;opacity:.85}
.wa-thread{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.wa-msg-wrap{display:flex;flex-direction:column}
.wa-msg-wrap.out{align-items:flex-end}
.wa-msg-wrap.in{align-items:flex-start}
.wa-bubble{
  max-width:78%;padding:10px 14px;font-size:15px;line-height:1.4;
  border-radius:10px;position:relative;
}
.wa-bubble.out{background:#DCF8C6;color:#111;border-radius:10px 10px 0 10px}
.wa-bubble.in{background:white;color:#111;border-radius:10px 10px 10px 0;box-shadow:0 1px 2px rgba(0,0,0,.1)}
.wa-bubble-meta{display:flex;align-items:center;gap:5px;justify-content:flex-end;margin-top:4px}
.wa-bubble-time{font-size:11px;color:#999}
.wa-bubble-ticks{font-size:13px;color:#4FC3F7}
.wa-voice-bubble{
  background:#DCF8C6;border-radius:10px 10px 0 10px;padding:10px 14px;
  display:flex;align-items:center;gap:10px;min-width:180px;
}
.wa-voice-play{width:38px;height:38px;background:#128C7E;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:16px;cursor:pointer;flex-shrink:0}
.wa-voice-wave{flex:1;height:24px;display:flex;align-items:center;gap:2px}
.wa-voice-bar{width:4px;border-radius:2px;background:#999}
.wa-voice-dur{font-size:13px;color:#666;flex-shrink:0}
.wa-input-row{
  background:white;padding:10px;border-top:1px solid #e8e8e8;
  display:flex;align-items:center;gap:8px;flex-shrink:0;
}
.wa-input-field{flex:1;background:#f2f2f7;border-radius:24px;padding:10px 14px;font-size:15px;color:#333;border:none;outline:none;font-family:var(--font-b)}
.wa-mic-btn{width:40px;height:40px;background:#128C7E;border-radius:50%;border:none;color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.wa-attach{color:#666;font-size:22px;cursor:pointer;flex-shrink:0}
.wa-annot{background:rgba(18,140,126,.1);border:1px solid rgba(18,140,126,.25);border-radius:10px;padding:8px 12px;margin:4px 0;font-size:13px;color:#0a5a52;display:flex;align-items:center;gap:6px}

/* ── GMAIL SIMULATION ── */
.gmail-ui{display:flex;flex-direction:column;height:100%;background:#f6f8fc;font-family:var(--font-b)}
.gmail-topbar{background:#1a73e8;padding:14px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.gmail-back{color:white;font-size:18px}
.gmail-title{color:white;font-size:17px;font-weight:700;flex:1}
.gmail-icons{display:flex;gap:12px;color:white;font-size:20px;opacity:.85}
.gmail-compose-btn{
  position:absolute;bottom:14px;right:14px;
  background:#1a73e8;color:white;border:none;border-radius:20px;
  padding:12px 20px;font-size:15px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;gap:6px;box-shadow:0 2px 8px rgba(26,115,232,.4);
  font-family:var(--font-b);
}
.gmail-list{flex:1;overflow-y:auto;background:white}
.gmail-item{
  display:flex;align-items:flex-start;gap:12px;padding:16px 14px;
  border-bottom:1px solid #f0f0f0;cursor:pointer;transition:background .1s;
  position:relative;
}
.gmail-item:hover{background:#f8f8f8}
.gmail-item.unread .gmail-item-sender{font-weight:800;color:#111}
.gmail-item.unread .gmail-item-subject{font-weight:700;color:#111}
.gmail-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:white;flex-shrink:0}
.gmail-item-body{flex:1;min-width:0}
.gmail-item-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.gmail-item-sender{font-size:15px;font-weight:600;color:#333}
.gmail-item-time{font-size:13px;color:#888;flex-shrink:0}
.gmail-item-subject{font-size:14px;color:#333;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gmail-item-preview{font-size:13px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gmail-unread-dot{width:10px;height:10px;border-radius:50%;background:#1a73e8;position:absolute;left:4px;top:50%;transform:translateY(-50%);flex-shrink:0}
.gmail-compose{position:absolute;inset:0;background:#fff;z-index:20;display:none;flex-direction:column;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.gmail-compose.open{display:flex}
.gmail-compose-header{background:#404040;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.gmail-compose-title{color:white;font-size:16px;font-weight:700}
.gmail-compose-close{background:transparent;border:none;color:white;font-size:22px;cursor:pointer}
.gmail-compose-field{border-bottom:1px solid #e0e0e0;padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.gmail-compose-label{font-size:15px;color:#666;width:40px;flex-shrink:0}
.gmail-compose-input{flex:1;border:none;outline:none;font-size:16px;font-family:var(--font-b);color:#333}
.gmail-compose-body{flex:1;padding:14px 16px;font-size:16px;color:#333;line-height:1.6}
.gmail-compose-footer{border-top:1px solid #e0e0e0;padding:12px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.gmail-send-btn{background:#1a73e8;color:white;border:none;border-radius:6px;padding:11px 22px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font-b)}
.gmail-attach-btn{background:transparent;border:none;font-size:22px;cursor:pointer;color:#666}
.gmail-annot{background:rgba(26,115,232,.08);border:1px solid rgba(26,115,232,.2);border-radius:10px;padding:9px 14px;margin:8px 12px;font-size:13px;color:#1a73e8;display:flex;align-items:center;gap:6px}

/* ── VIDEO CALL SIMULATION ── */
.video-ui{display:flex;flex-direction:column;height:100%;background:#1a1a2e;position:relative;font-family:var(--font-b)}
.video-remote{flex:1;background:linear-gradient(135deg,#2d3561,#1a1a2e);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;position:relative}
.video-remote-avatar{width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:44px}
.video-remote-name{color:white;font-size:20px;font-weight:700}
.video-remote-status{color:rgba(255,255,255,.6);font-size:15px}
.video-self-preview{
  position:absolute;bottom:80px;right:14px;width:80px;height:114px;
  border-radius:14px;background:linear-gradient(135deg,#1a3a6b,#0d2040);
  border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;
  font-size:28px;overflow:hidden;
}
.video-topbar{position:absolute;top:0;left:0;right:0;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(0,0,0,.5),transparent)}
.video-duration{color:white;font-size:17px;font-weight:700}
.video-enc{color:rgba(255,255,255,.7);font-size:13px;display:flex;align-items:center;gap:4px}
.video-controls{background:rgba(0,0,0,.6);padding:16px 12px;display:flex;justify-content:space-around;align-items:center;flex-shrink:0}
.vc-btn{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
.vc-icon{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;transition:all .15s}
.vc-icon:active{transform:scale(.9)}
.vc-lbl{font-size:13px;color:rgba(255,255,255,.7);font-weight:600}
.vc-icon.red{background:#E74C3C}
.vc-icon.gray{background:rgba(255,255,255,.15)}
.vc-icon.off{background:rgba(255,255,255,.08);opacity:.5}
.video-annot-wrap{position:absolute;bottom:80px;left:0;right:0;padding:0 14px;display:flex;flex-direction:column;gap:5px}
.video-annot{background:rgba(231,76,60,.15);border:1px solid rgba(231,76,60,.3);border-radius:10px;padding:8px 12px;font-size:13px;color:#ff9090;display:flex;align-items:center;gap:6px}

/* ── OUTLOOK SIMULATION ── */
.outlook-ui{display:flex;flex-direction:column;height:100%;background:#f3f2f1;font-family:var(--font-b)}
.outlook-topbar{background:#0078d4;padding:12px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.outlook-title{color:white;font-size:15px;font-weight:700;flex:1}
.outlook-icons{display:flex;gap:10px;color:white;font-size:16px;opacity:.9}
.outlook-compose{background:#0078d4;color:white;border:none;border-radius:4px;padding:8px 14px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:var(--font-b);flex-shrink:0}
.outlook-list{flex:1;overflow-y:auto;background:white}
.outlook-item{display:flex;align-items:flex-start;gap:10px;padding:14px 12px;border-bottom:1px solid #edebe9;cursor:pointer;transition:background .1s}
.outlook-item:hover{background:#f8f8f8}
.outlook-item.unread{border-left:4px solid #0078d4}
.outlook-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:white;flex-shrink:0}
.outlook-body{flex:1;min-width:0}
.outlook-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.outlook-sender{font-size:15px;font-weight:700;color:#323130}
.outlook-time{font-size:13px;color:#605e5c}
.outlook-subject{font-size:14px;color:#323130;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.outlook-preview{font-size:12px;color:#605e5c;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.outlook-compose-view{position:absolute;inset:0;background:white;z-index:20;display:none;flex-direction:column}
.outlook-compose-view.open{display:flex}
.outlook-compose-topbar{background:#0078d4;padding:12px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.outlook-compose-field{border-bottom:1px solid #edebe9;padding:10px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.outlook-compose-lbl{font-size:14px;color:#605e5c;width:38px;flex-shrink:0}
.outlook-compose-inp{flex:1;border:none;outline:none;font-size:15px;font-family:var(--font-b);color:#323130}
.outlook-compose-body{flex:1;padding:14px;font-size:15px;color:#323130;line-height:1.6;overflow-y:auto}
.outlook-compose-footer{border-top:1px solid #edebe9;padding:10px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.outlook-send-btn{background:#0078d4;color:white;border:none;border-radius:4px;padding:9px 18px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font-b)}
.outlook-toolbar{display:flex;gap:6px;font-size:18px;color:#605e5c}
.ol-annot{background:rgba(0,120,212,.08);border:1px solid rgba(0,120,212,.2);border-radius:8px;padding:8px 12px;margin:6px 12px;font-size:13px;color:#0078d4;display:flex;align-items:center;gap:5px}

/* ── COMPARE TABLE ── */
#s-compare{flex-direction:column;overflow:hidden}
.compare-header{display:flex;align-items:center;gap:10px;padding:10px 16px;flex-shrink:0;border-bottom:1px solid var(--border)}
.compare-body{flex:1;overflow:auto;padding:12px 16px 24px}
.compare-table{width:100%;border-collapse:separate;border-spacing:0 6px;min-width:520px}
.compare-table th{padding:8px 12px;font-family:var(--font-h);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-align:left}
.compare-table td{padding:10px 12px;font-size:12px;line-height:1.5;background:var(--s1);border-top:1px solid var(--border);border-bottom:1px solid var(--border);vertical-align:top}
.compare-table td:first-child{border-left:1px solid var(--border);border-radius:10px 0 0 10px}
.compare-table td:last-child{border-right:1px solid var(--border);border-radius:0 10px 10px 0}
.ct-tool{display:flex;align-items:center;gap:8px;font-family:var(--font-h);font-size:13px;font-weight:800}
.ct-ico{font-size:22px}
.ct-plus{font-size:11px;color:var(--green)}
.ct-minus{font-size:11px;color:var(--red)}
.ct-devices{display:flex;gap:4px;flex-wrap:wrap}
.ct-tag{font-size:10px;padding:2px 7px;border-radius:10px;background:rgba(255,255,255,.1);color:var(--muted)}

function buildSmsPhone() {
  const PH=580,PW=290,B=14,SH=PH-B*2,SW=PW-B*2;

function buildVideoPhone() {
  const PH=600,PW=295,B=14,SH=PH-B*2,SW=PW-B*2;
  const wrap=document.createElement('div');wrap.style.cssText='display:flex;flex-direction:column;align-items:center';
  const shell=document.createElement('div');shell.className='phone-shell';shell.style.cssText=`width:${PW}px;height:${PH}px;border-radius:46px`;
  const di=document.createElement('div');di.className='dyn-island';di.style.cssText=`width:110px;height:26px;top:14px`;shell.appendChild(di);
  const hb=document.createElement('div');hb.className='home-bar-s';hb.style.cssText=`width:100px;height:5px;bottom:8px`;shell.appendChild(hb);
  const screen=document.createElement('div');screen.className='phone-screen';screen.style.cssText=`top:${B}px;left:${B}px;width:${SW}px;height:${SH}px;border-radius:34px`;

  let micOn=true,camOn=true,timer=0;
  const ui=document.createElement('div');ui.className='video-ui';
  const timerEl=()=>document.getElementById('vc-timer');

  ui.innerHTML=`
    <div class="video-remote">
      <div class="video-topbar">
        <div class="video-duration" id="vc-timer">00:12</div>
        <div class="video-enc">🔒 Chiffré</div>
      </div>
      <div class="video-remote-avatar">👩</div>
      <div class="video-remote-name">Marie — votre fille</div>
      <div class="video-remote-status">📹 Appel vidéo en cours</div>
      <div class="video-self-preview">😊</div>
      <div class="video-annot-wrap">
        <div class="video-annot" id="vc-annot1">🎤 Tapez pour couper/activer le micro</div>
      </div>
    </div>
    <div class="video-controls">
      <div class="vc-btn" onclick="toggleMic(this)">
        <div class="vc-icon gray" id="vc-mic">🎤</div>
        <div class="vc-lbl">Micro</div>
      </div>
      <div class="vc-btn" onclick="toggleCam(this)">
        <div class="vc-icon gray" id="vc-cam">📷</div>
        <div class="vc-lbl">Caméra</div>
      </div>
      <div class="vc-btn">
        <div class="vc-icon gray" onclick="showHint('Caméra retournée — vous montrez la pièce !')">🔄</div>
        <div class="vc-lbl">Retourner</div>
      </div>
      <div class="vc-btn">
        <div class="vc-icon red" onclick="alert('Appel terminé. À bientôt !')">📵</div>
        <div class="vc-lbl">Raccrocher</div>
      </div>
    </div>`;

  // Timer
  const interval=setInterval(()=>{
    timer++;
    const m=String(Math.floor(timer/60)).padStart(2,'0');
    const s=String(timer%60).padStart(2,'0');
    const el=ui.querySelector('#vc-timer');
    if(el)el.textContent=`${m}:${s}`;
  },1000);
  ui._interval=interval;

  screen.appendChild(ui);shell.appendChild(screen);wrap.appendChild(shell);
  const lbl=document.createElement('div');lbl.className='sim-label';lbl.style.color='#E74C3C';lbl.textContent='Appel vidéo WhatsApp';wrap.appendChild(lbl);
  return wrap;
}

          <div style="width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:13px">📷</div>
          <span style="font-size:8px;color:rgba(255,255,255,.6)">Caméra</span>

function showHint(msg){
  let h=document.getElementById('sim-hint');
  if(!h){h=document.createElement('div');h.id='sim-hint';h.style.cssText='position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(26,62,107,.95);color:white;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:700;z-index:999;transition:opacity .25s;pointer-events:none';document.body.appendChild(h);}
  h.textContent='👆 '+msg;h.style.opacity='1';clearTimeout(h._t);h._t=setTimeout(()=>h.style.opacity='0',2200);
}

let micOn=true,camOn=true;
function toggleMic(el){
  micOn=!micOn;
  const ico=el.querySelector('.vc-icon');
  ico.textContent=micOn?'🎤':'🔇';
  ico.className='vc-icon '+(micOn?'gray':'off');
  showHint(micOn?'Micro activé — on vous entend':'Micro coupé — personne ne vous entend');
}
function toggleCam(el){
  camOn=!camOn;
  const ico=el.querySelector('.vc-icon');
  ico.textContent=camOn?'📷':'🚫';
  ico.className='vc-icon '+(camOn?'gray':'off');
  showHint(camOn?'Caméra activée — on vous voit':'Caméra coupée — on ne vous voit plus');
}

// ═══════════════════════════════════════════════════
// RENDER TOOL
// ═══════════════════════════════════════════════════
function showTool(idx){
  currentTool=idx;
  const t=TOOLS[idx];

  document.getElementById('tool-header-title').textContent=`${t.ico} ${t.name}`;

  const nav=document.getElementById('tool-nav-btns');
  nav.innerHTML='';
  TOOLS.forEach((tt,i)=>{
    const b=document.createElement('button');
    b.className='tnb'+(i===idx?' active':'');
    b.textContent=tt.ico;
    b.style.borderColor=i===idx?tt.color:'';
    b.style.background=i===idx?tt.color+'22':'';
    b.onclick=()=>showTool(i);
    nav.appendChild(b);
  });

  const body=document.getElementById('tool-body');
  body.innerHTML='';body.scrollTop=0;

  // Hero
  const hero=document.createElement('div');
  hero.className='hero-card';
  hero.style.cssText=`background:linear-gradient(135deg,${t.color}22,${t.color}11);border:1px solid ${t.color}44`;
  hero.innerHTML=`<div class="hero-ico">${t.ico}</div><div class="hero-info"><div class="hero-name" style="color:${t.color}">${t.name}</div><div class="hero-tagline">${t.tagline}</div><div class="hero-devices">${t.devices.map(d=>`<span class="device-tag">${d}</span>`).join('')}</div></div>`;
  body.appendChild(hero);

  // Simulation (if any)
  if(t.sim){
    const simSec=document.createElement('div');simSec.className='sim-section';
    const simTitle=document.createElement('div');simTitle.className='sim-section-title';
    simTitle.innerHTML='📱 Simulation de l\'interface';
    simSec.appendChild(simTitle);
    const simOuter=document.createElement('div');simOuter.className='sim-outer';

    if(t.sim==='sms'){
      simOuter.appendChild(buildSmsPhone());
    } else if(t.sim==='wa'){
      simOuter.appendChild(buildWaPhone());
    } else if(t.sim==='email'){
      simOuter.appendChild(buildGmailPhone());
      simOuter.appendChild(buildOutlookPC());
    } else if(t.sim==='video'){
      simOuter.appendChild(buildVideoPhone());
      simOuter.appendChild(buildMeetPC());
    }
    simSec.appendChild(simOuter);
    body.appendChild(simSec);
    body.appendChild(document.createElement('br'));
  }

  // Pro/con
  const pcTitle=document.createElement('div');pcTitle.className='section-title';pcTitle.innerHTML='✅ Avantages &amp; ⚠️ Limites';
  body.appendChild(pcTitle);
  const grid=document.createElement('div');grid.className='pro-con-grid';
  grid.innerHTML=`<div class="pro-col"><div class="pc-title">✅ Points +</div>${t.pros.map(p=>`<div class="pc-item"><div class="pci-dot"></div><span>${p}</span></div>`).join('')}</div><div class="con-col"><div class="pc-title">⚠️ Points −</div>${t.cons.map(c=>`<div class="pc-item"><div class="pci-dot"></div><span>${c}</span></div>`).join('')}</div>`;
  body.appendChild(grid);

  // Use cases
  const ucTitle=document.createElement('div');ucTitle.className='section-title';ucTitle.style.marginTop='6px';ucTitle.innerHTML='🎯 Quand l\'utiliser ?';
  body.appendChild(ucTitle);
  const ucs=document.createElement('div');ucs.className='use-cases';
  ucs.innerHTML=t.usecases.map(u=>`<div class="use-case"><div class="uc-ico">${u.ico}</div><div class="uc-text"><div class="uc-title">${u.title}</div><div class="uc-desc">${u.desc}</div></div></div>`).join('');
  body.appendChild(ucs);

  // Tip
  const tip=document.createElement('div');tip.className='tip-box';tip.innerHTML=t.tip;
  body.appendChild(tip);

  showScreen('s-tool');
}

function renderCompare(){
  const tbody=document.getElementById('compare-tbody');tbody.innerHTML='';
  TOOLS.forEach(t=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td><div class="ct-tool"><span class="ct-ico">${t.ico}</span><span style="color:${t.color}">${t.name}</span></div></td><td style="color:rgba(237,242,247,.85)">${t.compareIdeal}</td><td class="ct-plus">${t.comparePlus}</td><td class="ct-minus">${t.compareMoins}</td><td><div class="ct-devices">${t.compareDevices.map(d=>`<span class="ct-tag">${d}</span>`).join('')}</div></td>`;
    tbody.appendChild(tr);
  });
}
